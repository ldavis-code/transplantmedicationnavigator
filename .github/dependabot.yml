# Automated dependency updates. Security updates open PRs immediately;
# version updates are batched weekly to keep PR noise low.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/netlify/functions"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
